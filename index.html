<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Courses Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f4f4f4; color: #333; }
        nav { background-color: #2c3e50; padding: 15px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; cursor: pointer; }
        nav a:hover { color: #3498db; }
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        h1, h2 { color: #2c3e50; margin-bottom: 20px; text-align: center; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .course-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; transition: transform 0.3s; display: flex; flex-direction: column; }
        .course-card:hover { transform: translateY(-5px); }
        .course-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
        .course-card h3 { color: #2c3e50; font-size: 18px; margin-bottom: 8px; }
        .course-card p { color: #666; font-size: 14px; margin-bottom: 5px; }
        .category { background: #e1f5fe; color: #0288d1; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; align-self: flex-start; margin-bottom: 10px; }
        .id-badge { font-size: 11px; color: #999; margin-bottom: 5px; }
        button { background-color: #3498db; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: auto; width: 100%; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; margin-top: 5px; }
        .btn-danger:hover { background-color: #c0392b; }
        form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 450px; margin: 0 auto 30px; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('courses')">Browse Courses</a>
        <a onclick="checkAdminPass()">Admin Panel</a>
    </nav>

    <div class="container">
        <div id="home" class="page active">
            <h1>Welcome to Online Courses</h1>
            <p style="text-align: center; font-size: 18px;">Explore our wide range of online courses and expand your knowledge today!</p>
        </div>

        <div id="courses" class="page">
            <h1>Available Courses</h1>
            <div class="courses-grid" id="coursesList"></div>
        </div>

        <div id="admin" class="page">
            <h1>Admin Panel - Add New Course</h1>
            <form id="courseForm">
                <input type="text" id="courseName" placeholder="Course Title" required>
                <input type="text" id="courseCategory" placeholder="Category" required>
                <input type="url" id="courseImg" placeholder="Image URL" required>
                <input type="text" id="courseDesc" placeholder="Description" required>
                <input type="text" id="courseId" placeholder="Course ID" required>
                <button type="button" onclick="addCourse()">Add Course</button>
            </form>
            <h2>Manage Courses</h2>
            <div class="courses-grid" id="adminCoursesList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSuec1D4ydCEP173J6FBwrQ1OnKLsYtLM",
            authDomain: "omar-73dc3.firebaseapp.com",
            databaseURL: "https://omar-73dc3-default-rtdb.firebaseio.com",
            projectId: "omar-73dc3",
            storageBucket: "omar-73dc3.firebasestorage.app",
            messagingSenderId: "511676857911",
            appId: "1:511676857911:web:2a471573147479dd8ec9b2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, "courses");

        window.showPage = function(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
        }

        window.checkAdminPass = function() {
            const pass = prompt("Enter Admin Password:");
            if (pass === "admin123") {
                showPage('admin');
            } else if (pass !== null) {
                alert("Incorrect password!");
            }
        }

        onValue(dbRef, (snapshot) => {
            const coursesList = document.getElementById('coursesList');
            const adminCoursesList = document.getElementById('adminCoursesList');
            coursesList.innerHTML = '';
            adminCoursesList.innerHTML = '';
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach(key => {
                    const course = data[key];
                    const cardContent = `
                        <img src="${course.img || 'https://via.placeholder.com/300x160'}" alt="${course.name}">
                        <span class="category">${course.category}</span>
                        <div class="id-badge">ID: ${key}</div>
                        <h3>${course.name}</h3>
                        <button onclick="alert('Description: ${course.desc}')">More Info</button>
                    `;

                    const clientCard = document.createElement('div');
                    clientCard.className = 'course-card';
                    clientCard.innerHTML = cardContent;
                    coursesList.appendChild(clientCard);

                    const adminCard = document.createElement('div');
                    adminCard.className = 'course-card';
                    adminCard.innerHTML = cardContent + `<button class="btn-danger" onclick="deleteCourse('${key}')">Delete</button>`;
                    adminCoursesList.appendChild(adminCard);
                });
            }
        });
        window.addCourse = function() {
            const name = document.getElementById('courseName').value;
            const category = document.getElementById('courseCategory').value;
            const img = document.getElementById('courseImg').value;
            const desc = document.getElementById('courseDesc').value;
            if (name && category && img && desc) {
                push(dbRef, { name, category, img, desc });
                document.getElementById('courseForm').reset();
            } else {
                alert("Please fill in all fields.");
            }
        }

        window.deleteCourse = function(key) {
            if (confirm("Are you sure you want to delete this course?")) {
                remove(ref(db, "courses/" + key));
            }
        }
    </script>
</body>
</html>
