<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Courses Platform</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #0ea5e9;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --sidebar-width: 260px;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Cairo', sans-serif; 
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            display: flex;
            min-height: 100vh;
        }

        /* Modern Right Sidebar Navigation */
        nav { 
            background-color: #0f172a; 
            width: var(--sidebar-width);
            position: fixed;
            top: 0;
            bottom: 0;
            right: 0;
            padding: 40px 20px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            box-shadow: -4px 0 20px rgba(0,0,0,0.05);
        }

        nav .nav-brand {
            color: white;
            font-weight: 800;
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 20px;
        }

        nav a { 
            color: #94a3b8; 
            text-decoration: none; 
            padding: 12px 16px;
            border-radius: var(--radius);
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav a:hover, nav a.active-link { 
            color: white; 
            background-color: var(--primary);
        }

        /* Layout Container Adjustments for Sidebar */
        .container { 
            flex: 1;
            margin-right: var(--sidebar-width); 
            padding: 40px; 
            max-width: 1400px;
        }

        .page { 
            display: none; 
            animation: fadeIn 0.4s ease-out;
        }
        
        .page.active { 
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            color: var(--text-main); 
            font-weight: 800;
            font-size: 32px;
            margin-bottom: 30px; 
            position: relative;
            padding-bottom: 10px;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60px;
            height: 4px;
            background: var(--primary);
            border-radius: 2px;
        }

        h2 {
            color: var(--text-main);
            font-weight: 700;
            margin: 40px 0 20px;
        }

        /* Hero / Welcome Home Styling */
        .hero-section {
            background: linear-gradient(135deg, #4f46e5 0%, #0c4a6e 100%);
            color: white;
            padding: 60px 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            text-align: center;
            margin-bottom: 40px;
        }

        .hero-section h1 {
            color: white;
            margin-bottom: 15px;
            font-size: 36px;
        }
        
        .hero-section h1::after { display: none; }

        .hero-section p {
            color: #e2e8f0;
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Modern Card Grid Architecture */
        .courses-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
            margin-top: 20px; 
        }

        .course-card { 
            background: var(--bg-card); 
            border-radius: var(--radius); 
            box-shadow: var(--shadow); 
            padding: 20px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #f1f5f9;
        }

        .course-card:hover { 
            transform: translateY(-8px); 
            box-shadow: var(--shadow-lg);
            border-color: #e2e8f0;
        }

        .course-card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: calc(var(--radius) - 4px); 
            margin-bottom: 15px; 
        }

        .course-card h3 { 
            color: var(--text-main); 
            font-size: 19px; 
            font-weight: 700;
            margin-bottom: 10px; 
            line-height: 1.4;
        }

        .course-card p { 
            color: var(--text-muted); 
            font-size: 14px; 
            margin-bottom: 15px; 
            line-height: 1.6;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .category { 
            background: #eff6ff; 
            color: var(--primary); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 700; 
        }

        .id-badge { 
            font-size: 12px; 
            color: var(--text-muted); 
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Buttons & Forms Upgrade */
        button { 
            background-color: var(--primary); 
            color: white; 
            padding: 12px 20px; 
            border: none; 
            border-radius: var(--radius); 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 15px;
            margin-top: auto; 
            width: 100%; 
            transition: background-color 0.2s;
        }

        button:hover { 
            background-color: var(--primary-hover); 
        }

        .btn-danger { 
            background-color: var(--danger); 
            margin-top: 8px; 
        }
        
        .btn-danger:hover { 
            background-color: var(--danger-hover); 
        }

        form { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow); 
            max-width: 550px; 
            margin: 0 auto 40px; 
            border: 1px solid #f1f5f9;
        }

        .form-group {
            margin-bottom: 18px;
        }

        form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-main);
        }

        input { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: var(--radius); 
            background-color: #fff;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        /* Responsive Configuration */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            nav {
                width: 100%;
                position: relative;
                height: auto;
                padding: 15px;
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap;
                gap: 5px;
            }
            nav .nav-brand {
                display: none;
            }
            .container {
                margin-right: 0;
                padding: 20px;
            }
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('courses')">Browse Courses</a>
        <a onclick="checkAdminPass()">Admin Panel</a>
    </nav>

    <div class="container">
        <div id="home" class="page active">
            <h1>Welcome to Online Courses</h1>
            <p style="text-align: center; font-size: 18px;">Explore our wide range of online courses and expand your knowledge today!</p>
        </div>

        <div id="courses" class="page">
            <h1>Available Courses</h1>
            <div class="courses-grid" id="coursesList"></div>
        </div>

        <div id="admin" class="page">
            <h1>Admin Panel - Add New Course</h1>
            <form id="courseForm">
                <input type="text" id="courseName" placeholder="Course Title" required>
                <input type="text" id="courseCategory" placeholder="Category" required>
                <input type="url" id="courseImg" placeholder="Image URL" required>
                <input type="text" id="courseDesc" placeholder="Description" required>
                <input type="text" id="courseId" placeholder="Course ID" required>
                <button type="button" onclick="addCourse()">Add Course</button>
            </form>
            <h2>Manage Courses</h2>
            <div class="courses-grid" id="adminCoursesList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSuec1D4ydCEP173J6FBwrQ1OnKLsYtLM",
            authDomain: "omar-73dc3.firebaseapp.com",
            databaseURL: "https://omar-73dc3-default-rtdb.firebaseio.com",
            projectId: "omar-73dc3",
            storageBucket: "omar-73dc3.firebasestorage.app",
            messagingSenderId: "511676857911",
            appId: "1:511676857911:web:2a471573147479dd8ec9b2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, "courses");

        window.showPage = function(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
        }

        window.checkAdminPass = function() {
            const pass = prompt("Enter Admin Password:");
            if (pass === "admin123") {
                showPage('admin');
            } else if (pass !== null) {
                alert("Incorrect password!");
            }
        }

        onValue(dbRef, (snapshot) => {
            const coursesList = document.getElementById('coursesList');
            const adminCoursesList = document.getElementById('adminCoursesList');
            coursesList.innerHTML = '';
            adminCoursesList.innerHTML = '';
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                Object.keys(data).forEach(key => {
                    const course = data[key];
                    const cardContent = `
                        <img src="${course.img || 'https://via.placeholder.com/300x160'}" alt="${course.name}">
                        <span class="category">${course.category}</span>
                        <div class="id-badge">ID: ${key}</div>
                        <h3>${course.name}</h3>
                        <button onclick="alert('Description: ${course.desc}')">More Info</button>
                    `;

                    const clientCard = document.createElement('div');
                    clientCard.className = 'course-card';
                    clientCard.innerHTML = cardContent;
                    coursesList.appendChild(clientCard);

                    const adminCard = document.createElement('div');
                    adminCard.className = 'course-card';
                    adminCard.innerHTML = cardContent + `<button class="btn-danger" onclick="deleteCourse('${key}')">Delete</button>`;
                    adminCoursesList.appendChild(adminCard);
                });
            }
        });
        window.addCourse = function() {
            const name = document.getElementById('courseName').value;
            const category = document.getElementById('courseCategory').value;
            const img = document.getElementById('courseImg').value;
            const desc = document.getElementById('courseDesc').value;
            if (name && category && img && desc) {
                push(dbRef, { name, category, img, desc });
                document.getElementById('courseForm').reset();
            } else {
                alert("Please fill in all fields.");
            }
        }

        window.deleteCourse = function(key) {
            if (confirm("Are you sure you want to delete this course?")) {
                remove(ref(db, "courses/" + key));
            }
        }
    </script>
</body>
</html>
